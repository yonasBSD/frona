services:
  browserless:
    image: ghcr.io/browserless/chromium:v2.24.2
    ports:
      - "3333:3333"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - PREBOOT_CHROME=true
      - ENABLE_DEBUGGER=true
      - PORT=3333
      - TIMEOUT=1800000
    volumes:
      - ../data/browser_profiles:/profiles
    restart: unless-stopped

  searxng:
    image: searxng/searxng:2026.2.16-8e824017d
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_SECRET=change-me-to-something-random
    configs:
      - source: searxng-settings
        target: /etc/searxng/settings.yml
    restart: unless-stopped

  frona-dev:
    profiles: [dev]
    security_opt:
      - seccomp:unconfined
    build:
      context: ..
      dockerfile: build/Dockerfile
      target: dev
    ports:
      - "3001:3001"
      - "3000:3000"
    volumes:
      - ../engine:/app/engine
      - ../Cargo.toml:/app/Cargo.toml
      - ../Cargo.lock:/app/Cargo.lock
      - cargo-cache:/app/target
      - node-modules:/app/frontend/node_modules
      - ../frontend:/app/frontend
      - ../resources:/app/resources
      - ../data:/app/data
    environment:
      - ANTHROPIC_API_KEY
      - FRONA_SERVER_CORS_ORIGINS
      - FRONA_SERVER_BACKEND_URL
      - FRONA_SERVER_FRONTEND_URL
      - FRONA_LOG_LEVEL=debug
      - FRONA_BROWSER_WS_URL=ws://browserless:3333
      - FRONA_SEARCH_SEARXNG_BASE_URL=http://searxng:8080
      - FRONA_SERVER_PORT=3001
      - CARGO_BUILD_JOBS=4
      - WATCHPACK_POLLING=true
      - SURREAL_SYNC_DATA=true
      - FRONA_VOICE_CALLBACK_BASE_URL
      - FRONA_VOICE_TWILIO_ACCOUNT_SID
      - FRONA_VOICE_TWILIO_AUTH_TOKEN
      - FRONA_VOICE_TWILIO_FROM_NUMBER
      - FRONA_VOICE_TWILIO_VOICE_ID
      - FRONA_VOICE_TWILIO_SPEECH_MODEL
    depends_on: [browserless, searxng]
    restart: unless-stopped

  frona:
    profiles: [prod]
    cap_add:
      - SYS_PTRACE
    build:
      context: ..
      dockerfile: build/Dockerfile
      target: prod
    ports:
      - "3001:3001"
    volumes:
      - ../data:/app/data
    environment:
      - ANTHROPIC_API_KEY
      - FRONA_AUTH_ENCRYPTION_SECRET
      - FRONA_LOG_LEVEL=debug
      - FRONA_BROWSER_WS_URL=ws://browserless:3333
      - FRONA_SEARCH_SEARXNG_BASE_URL=http://searxng:8080
      - FRONA_VOICE_CALLBACK_BASE_URL
      - FRONA_VOICE_TWILIO_ACCOUNT_SID
      - FRONA_VOICE_TWILIO_AUTH_TOKEN
      - FRONA_VOICE_TWILIO_FROM_NUMBER
      - FRONA_VOICE_TWILIO_VOICE_ID
      - FRONA_VOICE_TWILIO_SPEECH_MODEL
    depends_on: [browserless, searxng]
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - http
      - frona-dev:3001
      - "--log=stdout"
      # - "--log-level=debug"
    environment:
      - NGROK_AUTHTOKEN
    ports:
      - "4040:4040"

configs:
  searxng-settings:
    content: |
      use_default_settings: true
      search:
        formats:
          - html
          - json

volumes:
  cargo-cache:
  node-modules:
