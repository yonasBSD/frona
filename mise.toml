[tools]
rust = "1.89"
node = "22"
rust-analyzer = "latest"
"cargo:cargo-watch" = "latest"

[env]
FRONA_DATABASE_PATH = "data/db"
FRONA_LOG_LEVEL = "debug"
FRONA_SERVER_BACKEND_URL = "http://localhost:3001"
FRONA_SERVER_FRONTEND_URL = "http://localhost:3000"
FRONA_SERVER_PORT = "3001"
FRONA_SERVER_CORS_ORIGINS = "http://localhost:3000"
FRONA_BROWSER_WS_URL = "ws://localhost:3333"
FRONA_BROWSER_PROFILES_PATH = "/profiles"

[tasks.dev]
description = "Run backend + frontend in parallel"
depends = ["install-frontend", "dev:frontend", "dev:backend"]

[tasks."dev:frontend"]
description = "Run Next.js dev server"
dir = "web"
run = "npm run dev"

[tasks."dev:backend"]
description = "Run backend with cargo-watch"
run = "cargo watch -w crates/ -w Cargo.toml -w Cargo.lock --delay 3 -x 'run -p frona-server'"

[tasks.install-frontend]
description = "Install frontend dependencies"
dir = "web"
run = "npm install"

[tasks.build]
description = "Production build (frontend + backend)"
depends = ["build:frontend", "build:backend"]

[tasks."build:frontend"]
description = "Build frontend static export"
dir = "web"
run = "npm ci && npm run build"

[tasks."build:backend"]
description = "Build backend release binary"
run = "cargo build --release -p frona-server"

[tasks.check]
description = "Cargo check all crates"
run = "cargo check --workspace"

[tasks.lint]
description = "Run clippy + frontend lint"
depends = ["lint:backend", "lint:frontend"]

[tasks."lint:backend"]
description = "Run clippy"
run = "cargo clippy --workspace -- -D warnings"

[tasks."lint:frontend"]
description = "Run Next.js lint"
dir = "web"
run = "npm run lint"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks."test:e2e"]
description = "Build the fake MCP server and run end-to-end tests"
run = """
cargo build -p frona-server --bin fake-mcp-server --features __test-bins
cargo test -p frona-server --test mcp_e2e -- --ignored
"""

[tasks."test:all"]
description = "Run all tests including end-to-end"
depends = ["test", "test:e2e"]

[tasks.docker]
description = "Build production Docker image"
run = "build/build.sh"

[tasks.release]
description = "Release: bump version, git tag, build and push Docker image"
run = "build/release.sh"

[tasks."docker:publish"]
description = "Build production image and push to GHCR"
run = "build/publish.sh"

[tasks."docker:dev"]
description = "Run full dev stack in Docker (with hot-reload)"
run = "docker compose -f build/docker-compose.yml --profile dev up --build"

[tasks."docker:dev:down"]
description = "Stop dev Docker stack"
run = "docker compose -f build/docker-compose.yml --profile dev down"

[tasks."docker:prod"]
description = "Run production stack in Docker"
run = "docker compose -f build/docker-compose.yml --profile prod up --build"

[tasks."docker:prod:down"]
description = "Stop production Docker stack"
run = "docker compose -f build/docker-compose.yml --profile prod down"

[tasks."docker:update-versions"]
description = "Pull latest dependencies and update version locks"
run = "build/update-versions.sh"

[tasks.clean]
description = "Remove build artifacts and generated files"
run = """
cargo clean
rm -rf web/.next web/node_modules web/out
"""
