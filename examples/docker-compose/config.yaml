# Define named model groups. Agents reference these by name.

models:
  primary:
    main: anthropic/claude-sonnet-4-6
    fallbacks:
      - anthropic/claude-haiku-4-5
    max_tokens: 64000
#  coding:
#    main: anthropic/claude-opus-4-6
#    max_tokens: 100000
#  reasoning:
#    main: anthropic/claude-opus-4-6
#    max_tokens: 100000

# Model group options:
#   main: provider/model-id (required)
#   fallbacks: list of provider/model-id to try if main fails
#   max_tokens: max output tokens
#   temperature: 0.0-2.0
#   context_window: override context window size
#   retry:
#     max_retries: 10
#     initial_backoff_ms: 1000
#     backoff_multiplier: 2.0
#     max_backoff_ms: 60000
